services:
  - type: web
    name: smartseason-app
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        fromService:
          type: web
          name: smartseason-app
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smartseason-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartseason-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smartseason-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smartseason-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartseason-db
          property: password
      - key: LOG_CHANNEL
        value: errorlog

  - type: cron
    name: smartseason-scheduler
    env: docker
    plan: free
    region: ohio
    schedule: "* * * * *"
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerCommand: php artisan schedule:run
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smartseason-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartseason-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smartseason-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smartseason-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartseason-db
          property: password

databases:
  - name: smartseason-db
    plan: free
    region: ohio
